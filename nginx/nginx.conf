# AWS VPS — Layer 2 load balancer (least_conn). Typical stack:
#   Internet / Colab → Cloudflare Tunnel (cloudflared on this VPS) → THIS nginx :80
#   GPU workers on Colab talk to broker via REDIS_URL (tunnel TCP or VPN); not through nginx.
# Upstream: FastAPI (Uvicorn) replicas. Redis broker: same VPC host, not fronted by nginx.
# `least_conn` spreads new connections to the backend with the fewest active connections.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    client_max_body_size 20m;

    # Upstream: multiple API instances (e.g. Uvicorn on 8001–8004) or tunnels to Colab HTTP shims.
    # Example hostnames — replace with real IPs or tunnel URLs (use resolver if using dynamic DNS).
    upstream api_backend {
        least_conn;
        # server 10.0.0.1:8000;
        # server 10.0.0.2:8000;
        # server 127.0.0.1:8001;
        # server 127.0.0.1:8002;
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
