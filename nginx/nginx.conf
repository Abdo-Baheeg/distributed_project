upstream fastapi_cluster {
    # Points to your FastAPI application running on the specified port
    server 127.0.0.1:8000;
    
    # Strategy: Least Connections (Ideal for LLM workloads) [cite: 76]
    least_conn;
}

server {
    listen 80;
    server_name your-ec2-ip;

    location / {
        proxy_pass http://fastapi_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # High timeout for slow RAG/LLM processing [cite: 69]
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}